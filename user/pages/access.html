<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Enter your event code to access your private photo gallery." />
  <title>Access Event – Event Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="../css/access.css" rel="stylesheet" />
  <link href="../css/darkmode.css" rel="stylesheet" />
  <link href="../css/transitions.css" rel="stylesheet" />
</head>
<body class="access-body d-flex flex-column">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="../index.html">
        <span class="brand-logo"><i class="bi bi-camera-fill"></i></span>
        Event Gallery
      </a>
      <button class="navbar-toggler border-0" type="button" id="navToggler">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-collapse" id="nav">
        <div class="nav-drawer-close"><button onclick="closeNav()">&times;</button></div>
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
      <div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>
    </div>
  </nav>

  <div class="container py-5 flex-grow-1 d-flex align-items-center">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-8 col-md-5">

        <div class="text-center text-white mb-4">
          <i class="bi bi-camera-fill display-4"></i>
          <h4 class="fw-bold mt-2">Event Gallery</h4>
        </div>

        <div class="card shadow-lg p-4 card-unlock" id="accessCard">
          <div class="text-center mb-4">
            <span class="key-icon"><i class="bi bi-key-fill text-primary display-5"></i></span>
            <h5 class="fw-bold mt-2">Access Your Event</h5>
            <p class="text-muted small">Enter the code provided by your photographer or organizer</p>
          </div>

          <form id="accessForm" action="gallery.html" method="get">
            <div class="mb-3">
              <label class="form-label fw-semibold d-block text-center mb-3">Event Code</label>
              <div class="code-boxes" id="codeBoxes">
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
                <input class="code-box" maxlength="1" type="text" autocomplete="off" />
              </div>
              <input type="hidden" id="eventCode" name="code" />
              <div id="codeHint" class="form-text text-center mt-2"></div>
            </div>
            <div class="d-grid">
              <button type="submit" id="submitBtn" class="btn btn-primary btn-lg rounded-3">
                <i class="bi bi-images me-2"></i>View Photos
              </button>
            </div>
          </form>

          <p class="text-center text-muted small mt-3 mb-0">
            <a href="../index.html" class="text-decoration-none">
              <i class="bi bi-arrow-left me-1"></i>Back to Home
            </a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <footer class="py-3 text-center">
    <p class="text-white-50 small mb-0">&copy; 2025 Event Gallery &mdash; <a href="../index.html" class="text-white-50">Home</a> &middot; <a href="../pages/contact.html" class="text-white-50">Contact</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <button id="darkToggle" onclick="toggleDark()" title="Toggle dark mode"><i class="bi bi-moon-fill"></i></button>
  <script>
    function openNav() { document.getElementById('nav').classList.add('show'); document.getElementById('navOverlay').classList.add('show'); document.body.style.overflow='hidden'; }
    function closeNav() { document.getElementById('nav').classList.remove('show'); document.getElementById('navOverlay').classList.remove('show'); document.body.style.overflow=''; }
    document.getElementById('navToggler').addEventListener('click', openNav);

    function toggleDark() { document.body.classList.toggle('dark'); const on = document.body.classList.contains('dark'); localStorage.setItem('dark', on); document.getElementById('darkToggle').innerHTML = on ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>'; }
    if (localStorage.getItem('dark') === 'true') { document.body.classList.add('dark'); document.addEventListener('DOMContentLoaded', () => { document.getElementById('darkToggle').innerHTML = '<i class="bi bi-sun-fill"></i>'; }); }

    const boxes = document.querySelectorAll('.code-box');
    const hiddenInput = document.getElementById('eventCode');
    const hint = document.getElementById('codeHint');
    const form = document.getElementById('accessForm');
    const btn  = document.getElementById('submitBtn');
    const card = document.getElementById('accessCard');

    boxes.forEach((box, i) => {
      box.addEventListener('input', e => {
        const val = box.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        box.value = val;
        if (val) {
          box.classList.add('filled');
          if (i < boxes.length - 1) boxes[i + 1].focus();
        } else {
          box.classList.remove('filled');
        }
        syncCode();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
          boxes[i - 1].value = '';
          boxes[i - 1].classList.remove('filled');
          boxes[i - 1].focus();
          syncCode();
        }
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData.getData('text') || '').replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0, boxes.length);
        [...text].forEach((ch, j) => { if (boxes[j]) { boxes[j].value = ch; boxes[j].classList.add('filled'); } });
        if (boxes[text.length]) boxes[text.length].focus();
        else boxes[boxes.length - 1].focus();
        syncCode();
      });
    });

    function syncCode() {
      const code = [...boxes].map(b => b.value).join('');
      hiddenInput.value = code;
      hint.textContent = code.length >= 4 ? '✓ Looks good!' : code.length > 0 ? 'Keep typing...' : '';
      hint.className = 'form-text text-center mt-2 ' + (code.length >= 4 ? 'text-success' : 'text-muted');
    }

    const lastCode = localStorage.getItem('lastEventCode') || '';
    if (lastCode) {
      [...lastCode.slice(0, boxes.length)].forEach((ch, i) => { boxes[i].value = ch; boxes[i].classList.add('filled'); });
      syncCode();
    }

    form.addEventListener('submit', e => {
      const code = hiddenInput.value.trim();
      if (code.length < 4) {
        e.preventDefault();
        boxes.forEach(b => { b.classList.add('shake'); b.addEventListener('animationend', () => b.classList.remove('shake'), { once: true }); });
        return;
      }
      e.preventDefault();
      localStorage.setItem('lastEventCode', code);
      card.classList.add('unlocking', 'open');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Unlocking...';
      btn.disabled = true;
      setTimeout(() => { window.location = 'gallery.html?code=' + encodeURIComponent(code); }, 900);
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto') || a.target) return;
        a.addEventListener('click', e => { e.preventDefault(); document.body.classList.add('page-leave'); setTimeout(() => window.location = href, 280); });
      });
      boxes[0].focus();
    });
  </script>
</body>
</html>
