<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Event Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/darkmode.css" rel="stylesheet" />
  <link href="css/transitions.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height: 100vh; display: flex; flex-direction: column; }
    .error-code { font-size: 8rem; font-weight: 900; line-height: 1; background: linear-gradient(135deg,#fff,#adb5bd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .error-icon { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    footer { background: #0a0e1a; }
    footer a { color: #adb5bd; text-decoration: none; }
    footer a:hover { color: #fff; }
  </style>
</head>
<body class="d-flex flex-column">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
        <span class="brand-logo"><i class="bi bi-camera-fill"></i></span>
        Event Gallery
      </a>
      <button class="navbar-toggler border-0" type="button" id="navToggler">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-collapse" id="nav">
        <div class="nav-drawer-close"><button onclick="closeNav()">&times;</button></div>
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="pages/about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="pages/contact.html">Contact</a></li>
        </ul>
      </div>
      <div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>
    </div>
  </nav>

  <div class="flex-grow-1 d-flex align-items-center justify-content-center text-center text-white px-3">
    <div>
      <i class="bi bi-camera-off display-1 mb-3 d-block error-icon text-white-50"></i>
      <div class="error-code">404</div>
      <h2 class="fw-bold mt-2 mb-2">Page Not Found</h2>
      <p class="text-white-50 mb-4">The page you're looking for doesn't exist or has been moved.</p>
      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="index.html" class="btn btn-light btn-lg rounded-pill px-4">
          <i class="bi bi-house-fill me-2"></i>Go Home
        </a>
        <a href="pages/access.html" class="btn btn-outline-light btn-lg rounded-pill px-4">
          <i class="bi bi-key-fill me-2"></i>Access Event
        </a>
      </div>
    </div>
  </div>

  <footer class="py-4 text-white">
    <div class="container text-center">
      <p class="text-secondary small mb-0">&copy; 2025 Event Gallery &mdash; All rights reserved</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <button id="darkToggle" onclick="toggleDark()" title="Toggle dark mode"><i class="bi bi-moon-fill"></i></button>
  <script src="js/common.js"></script>
</body>
</html>
