<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – SnapEvent</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/settings.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<input type="checkbox" id="mob-toggle" hidden/>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-camera-retro"></i></div>
      <div><div class="brand-name">SnapEvent</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <div class="nav-group-label">MAIN</div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><span class="nav-icon dash-icon"><i class="fa-solid fa-gauge-high"></i></span>Dashboard</a>
      <a href="events.html"  class="nav-item"><span class="nav-icon events-icon"><i class="fa-solid fa-folder"></i></span>Events</a>
      <a href="photos.html"  class="nav-item"><span class="nav-icon photos-icon"><i class="fa-solid fa-images"></i></span>Photos</a>
      <a href="upload.html"  class="nav-item"><span class="nav-icon upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></span>Upload</a>
    </nav>
    <div class="nav-group-label">ACCOUNT</div>
    <nav class="sidebar-nav">
      <a href="profile.html"  class="nav-item"><span class="nav-icon profile-icon"><i class="fa-solid fa-user"></i></span>Profile</a>
      <a href="settings.html" class="nav-item active"><span class="nav-icon settings-icon"><i class="fa-solid fa-gear"></i></span>Settings</a>
      <a href="#" class="nav-item"><span class="nav-icon logout-icon"><i class="fa-solid fa-right-from-bracket"></i></span>Logout</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar"><i class="fa-solid fa-user"></i></div>
      <div><div class="sidebar-user-name">Admin User</div><div class="sidebar-user-email">admin@snapevent.com</div></div>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="header">
      <label for="mob-toggle" class="mob-btn"><i class="fa-solid fa-bars"></i></label>
      <div class="breadcrumb"><span class="bc-home">Home</span><span class="bc-sep">/</span><span class="bc-current">Settings</span></div>
      <div class="header-right">
        <div class="notif-wrap"><i class="fa-solid fa-bell"></i><span class="notif-badge">3</span></div>
        <div class="header-icon"><i class="fa-solid fa-sliders"></i></div>
        <div class="header-avatar"><i class="fa-solid fa-user"></i></div>
      </div>
    </header>

    <main class="content">
      <div class="page-heading">
        <div><h2>Settings</h2><p class="page-sub">Manage your application preferences.</p></div>
      </div>

      <!-- General Settings -->
      <div class="card" style="margin-bottom:1.25rem">
        <div class="settings-section-title"><i class="fa-solid fa-sliders"></i> General</div>
        <div class="settings-grid">
          <div class="form-group">
            <label>Site Name</label>
            <input type="text" value="SnapEvent"/>
          </div>
          <div class="form-group">
            <label>Contact Email</label>
            <input type="email" value="admin@snapevent.com"/>
          </div>
          <div class="form-group">
            <label>Timezone</label>
            <select>
              <option>UTC+05:00 – Karachi</option>
              <option>UTC+00:00 – London</option>
              <option>UTC-05:00 – New York</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date Format</label>
            <select>
              <option>MMM DD, YYYY</option>
              <option>DD/MM/YYYY</option>
              <option>YYYY-MM-DD</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:.75rem">Save General</button>
      </div>

      <!-- Storage Settings -->
      <div class="card" style="margin-bottom:1.25rem">
        <div class="settings-section-title"><i class="fa-solid fa-hard-drive"></i> Storage</div>
        <div class="settings-grid">
          <div class="form-group">
            <label>Max Upload Size (MB)</label>
            <input type="number" value="10"/>
          </div>
          <div class="form-group">
            <label>Allowed File Types</label>
            <input type="text" value="jpg, jpeg, png, webp"/>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:.75rem">Save Storage</button>
      </div>

      <!-- Notification Settings -->
      <div class="card">
        <div class="settings-section-title"><i class="fa-solid fa-bell"></i> Notifications</div>
        <div class="settings-grid">
          <div class="form-group">
            <label>Email on New Upload</label>
            <select>
              <option>Enabled</option>
              <option>Disabled</option>
            </select>
          </div>
          <div class="form-group">
            <label>Email on New Event</label>
            <select>
              <option>Enabled</option>
              <option>Disabled</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:.75rem">Save Notifications</button>
      </div>
    </main>
  </div>
</div>
</body>
</html>
